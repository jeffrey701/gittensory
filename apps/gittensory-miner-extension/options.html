<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LoopOver Miner Extension</title>
    <style>
      body {
        margin: 0;
        background: #0f1117;
        color: #f4f7f5;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        max-width: 560px;
        margin: 0 auto;
        padding: 32px 20px;
      }
      label {
        display: grid;
        gap: 6px;
        margin-top: 16px;
      }
      input,
      textarea {
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.06);
        color: inherit;
        font: inherit;
        padding: 9px 10px;
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }
      button {
        margin-top: 18px;
        border: 0;
        border-radius: 7px;
        background: #7ee7bc;
        color: #111317;
        cursor: pointer;
        font-weight: 700;
        padding: 9px 12px;
      }
      p {
        color: rgba(244, 247, 245, 0.68);
      }
      #status {
        min-height: 20px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>LoopOver miner extension</h1>
      <p>
        Configure which repositories this contributor-facing extension should watch on GitHub issue pages. This is a
        separate product surface from the maintainer overlay at <code>apps/gittensory-extension/</code>.
      </p>
      <form id="settings">
        <label>
          Watched repositories
          <textarea id="watchedRepos" name="watchedRepos" placeholder="owner/repo, one per line"></textarea>
        </label>
        <label>
          Ranked candidates JSON (local cache)
          <textarea
            id="rankedCandidatesJson"
            name="rankedCandidatesJson"
            placeholder='[{"repoFullName":"owner/repo","issueNumber":1,"rankScore":0.82,...}]'
          ></textarea>
        </label>
        <button type="submit">Save</button>
      </form>
      <p id="status" role="status"></p>
    </main>
    <script src="options.js" type="module"></script>
  </body>
</html>
